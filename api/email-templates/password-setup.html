<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设置账号密码</title>
  </head>
  <body style="margin:0;background:#f5f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e9f2;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 18px;border-bottom:1px solid #edf0f6;">
                <div style="font-size:14px;color:#637083;">{{.SiteName}}</div>
                <h1 style="margin:10px 0 0;font-size:24px;line-height:1.35;color:#111827;">你的账号已创建</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px;">
                <p style="margin:0 0 14px;font-size:15px;line-height:1.8;">你好 {{.DisplayName}}，管理员已为 {{.Email}} 创建账号。</p>
                <p style="margin:0 0 12px;font-size:15px;line-height:1.8;color:#4b5563;">你可以使用下面的临时密码登录系统，也可以直接点击重置入口改成自己的密码。重置入口会在 {{.ExpiresIn}} 后失效。</p>
                <div style="margin:0 0 24px;padding:14px 16px;background:#f3f6fb;border:1px solid #dbe3ef;border-radius:8px;">
                  <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">临时密码</div>
                  <div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:18px;letter-spacing:1px;color:#111827;">{{.InitialPassword}}</div>
                </div>
                <p style="margin:0 0 24px;">
                  <a href="{{.LoginURL}}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;padding:12px 18px;border-radius:8px;">登录系统</a>
                  <a href="{{.ActionURL}}" style="display:inline-block;margin-left:10px;background:#eef2ff;color:#1d4ed8;text-decoration:none;font-size:15px;font-weight:700;padding:12px 18px;border-radius:8px;">重置密码</a>
                </p>
                <p style="margin:0 0 8px;font-size:13px;color:#6b7280;">如果按钮无法打开，也可以复制下面的登录链接到浏览器：</p>
                <p style="margin:0 0 12px;word-break:break-all;font-size:13px;line-height:1.6;color:#2563eb;">{{.LoginURL}}</p>
                <p style="margin:0 0 8px;font-size:13px;color:#6b7280;">重置密码链接：</p>
                <p style="margin:0 0 18px;word-break:break-all;font-size:13px;line-height:1.6;color:#2563eb;">{{.ActionURL}}</p>
                <p style="margin:0;font-size:13px;color:#6b7280;">备用重置 token：<span style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace;color:#111827;">{{.Token}}</span></p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px;background:#f9fafb;color:#6b7280;font-size:12px;line-height:1.7;">首次登录后建议尽快重置密码。如果你没有预期收到这封邀请，可以忽略这封邮件。</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
